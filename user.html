<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>걷기모임 신청 | 걷기모임 모집 시스템</title>
  <meta name="description" content="모집 중인 걷기모임을 선택하고 참가 신청을 접수합니다." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 홈으로</a>
      <div class="logo">
        <i class="fas fa-user-check"></i>
        <span>참가자 신청</span>
      </div>
      <div class="header-spacer"></div>
    </div>
  </header>

  <main class="page-main">
    <div id="configAlert" class="config-alert" style="display:none;"></div>

    <div class="info-banner">
      <i class="fas fa-circle-info"></i>
      <span>원하는 걷기모임을 선택한 뒤 신청서를 작성해 주세요. 중복 신청은 자동으로 차단됩니다.</span>
    </div>

    <section class="section-block">
      <h2 class="section-title"><i class="fas fa-list-ul"></i> 현재 모집 중인 걷기모임</h2>
      <div id="meetingList" class="meeting-list">
        <div class="loading-state">
          <i class="fas fa-spinner fa-spin"></i>
          <p>모임 목록을 불러오는 중입니다...</p>
        </div>
      </div>
    </section>

    <section id="applySection" class="section-block" style="display:none;">
      <h2 class="section-title"><i class="fas fa-pen-to-square"></i> 신청서 작성</h2>
      <div id="selectedMeetingInfo" class="selected-meeting-info"></div>

      <form id="applyForm" class="apply-form" novalidate>
        <div class="form-group">
          <label for="userName">이름 <span class="required">*</span></label>
          <input type="text" id="userName" maxlength="20" placeholder="실명을 입력해 주세요" autocomplete="name" />
          <span class="field-hint">예: 홍길동</span>
        </div>

        <div class="form-group">
          <label for="userPhone">전화번호 <span class="required">*</span></label>
          <input type="tel" id="userPhone" maxlength="13" inputmode="numeric" placeholder="010-0000-0000" autocomplete="tel" />
          <span class="field-hint">숫자만 입력하면 자동으로 하이픈이 붙습니다.</span>
        </div>

        <div class="form-group">
          <label for="userAccount">계좌번호 <span class="required">*</span></label>
          <input type="text" id="userAccount" maxlength="50" placeholder="예: 신한 110-123-456789" />
          <span class="field-hint">은행명과 계좌번호를 함께 입력해 주세요.</span>
        </div>

        <div class="form-actions">
          <button type="button" id="cancelApply" class="btn btn-secondary">
            <i class="fas fa-xmark"></i> 취소
          </button>
          <button type="submit" id="submitApplyBtn" class="btn btn-primary">
            <i class="fas fa-paper-plane"></i> 신청하기
          </button>
        </div>
      </form>
    </section>

    <div id="successMessage" class="success-overlay" style="display:none;">
      <div class="success-box">
        <div class="success-icon"><i class="fas fa-circle-check"></i></div>
        <h3>신청이 완료되었습니다</h3>
        <p id="successDetail"></p>
        <button class="btn btn-primary" id="successResetBtn">
          <i class="fas fa-rotate-left"></i> 처음으로
        </button>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>문의사항은 모임 주최자에게 연락해 주세요.</p>
  </footer>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    // 반드시 본인 Supabase 값으로 바꿔 주세요.
    const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_OR_PUBLISHABLE_KEY';

    const configAlert = document.getElementById('configAlert');
    const meetingListEl = document.getElementById('meetingList');
    const applySectionEl = document.getElementById('applySection');
    const selectedMeetingInfoEl = document.getElementById('selectedMeetingInfo');
    const applyFormEl = document.getElementById('applyForm');
    const submitApplyBtn = document.getElementById('submitApplyBtn');
    const successMessageEl = document.getElementById('successMessage');
    const successDetailEl = document.getElementById('successDetail');

    let supabase = null;
    let meetings = [];
    let selectedMeeting = null;

    function isConfigured() {
      return !SUPABASE_URL.includes('YOUR_PROJECT') && !SUPABASE_ANON_KEY.includes('YOUR_SUPABASE');
    }

    function showConfigAlert() {
      configAlert.style.display = 'flex';
      configAlert.innerHTML = '<i class="fas fa-triangle-exclamation"></i><div><strong>Supabase 설정이 필요합니다.</strong><br />user.html 상단의 <code>SUPABASE_URL</code>, <code>SUPABASE_ANON_KEY</code>를 본인 프로젝트 값으로 바꿔 주세요.</div>';
    }

    function normalizePhone(value) {
      return value.replace(/\D/g, '').slice(0, 11);
    }

    function formatPhone(value) {
      const n = normalizePhone(value);
      if (n.length < 4) return n;
      if (n.length < 8) return `${n.slice(0, 3)}-${n.slice(3)}`;
      return `${n.slice(0, 3)}-${n.slice(3, 7)}-${n.slice(7, 11)}`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(`${dateStr}T00:00:00`);
      return date.toLocaleDateString('ko-KR', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'short'
      });
    }

    function formatTime(timeStr) {
      if (!timeStr) return '';
      return timeStr.slice(0, 5);
    }

    function formatMeetingDateTime(meeting) {
      return `${formatDate(meeting.meeting_date)} · ${formatTime(meeting.meeting_time)}`;
    }

    function escapeHtml(value = '') {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderMeetings() {
      if (!meetings.length) {
        meetingListEl.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-calendar-xmark"></i>
            <p>현재 모집 중인 걷기모임이 없습니다.<br />나중에 다시 확인해 주세요.</p>
          </div>`;
        return;
      }

      meetingListEl.innerHTML = meetings.map((meeting) => {
        const full = meeting.current_participants >= meeting.max_participants || meeting.status === '마감';
        return `
          <article class="meeting-card ${full ? 'full' : ''}">
            <div class="meeting-card-header">
              <h3>${escapeHtml(meeting.title)}</h3>
              <span class="badge ${full ? 'badge-full' : 'badge-open'}">${full ? '마감' : '모집중'}</span>
            </div>
            <div class="meeting-card-info">
              <span><i class="fas fa-calendar-day"></i> ${escapeHtml(formatMeetingDateTime(meeting))}</span>
              <span><i class="fas fa-location-dot"></i> ${escapeHtml(meeting.location || '장소 미정')}</span>
              <span><i class="fas fa-users"></i> ${meeting.current_participants} / ${meeting.max_participants}명</span>
            </div>
            ${meeting.description ? `<p class="meeting-desc">${escapeHtml(meeting.description)}</p>` : ''}
            <button class="btn ${full ? 'btn-disabled' : 'btn-primary'} btn-full" ${full ? 'disabled' : ''} data-meeting-id="${meeting.id}">
              ${full ? '<i class="fas fa-lock"></i> 마감되었습니다' : '<i class="fas fa-pen-to-square"></i> 이 모임 신청하기'}
            </button>
          </article>`;
      }).join('');

      meetingListEl.querySelectorAll('[data-meeting-id]').forEach((button) => {
        button.addEventListener('click', () => selectMeeting(button.dataset.meetingId));
      });
    }

    async function loadMeetings() {
      if (!supabase) return;
      meetingListEl.innerHTML = `
        <div class="loading-state">
          <i class="fas fa-spinner fa-spin"></i>
          <p>모임 목록을 불러오는 중입니다...</p>
        </div>`;

      const { data, error } = await supabase
        .from('meetings')
        .select('id, title, meeting_date, meeting_time, location, max_participants, current_participants, description, status, created_at')
        .eq('status', '모집중')
        .order('meeting_date', { ascending: true })
        .order('meeting_time', { ascending: true });

      if (error) {
        meetingListEl.innerHTML = `
          <div class="error-state">
            <i class="fas fa-triangle-exclamation"></i>
            <p>모임을 불러오지 못했습니다.<br />Supabase 설정과 RLS 정책을 확인해 주세요.</p>
          </div>`;
        return;
      }

      meetings = data || [];
      renderMeetings();
    }

    function selectMeeting(meetingId) {
      selectedMeeting = meetings.find((meeting) => meeting.id === meetingId) || null;
      if (!selectedMeeting) return;

      selectedMeetingInfoEl.innerHTML = `
        <div class="selected-badge"><i class="fas fa-circle-check"></i> 선택된 모임</div>
        <strong>${escapeHtml(selectedMeeting.title)}</strong>
        <span>${escapeHtml(formatMeetingDateTime(selectedMeeting))} · ${escapeHtml(selectedMeeting.location || '장소 미정')}</span>
        <span>모집 현황 ${selectedMeeting.current_participants} / ${selectedMeeting.max_participants}명</span>`;

      applySectionEl.style.display = 'block';
      applySectionEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function resetForm() {
      selectedMeeting = null;
      applyFormEl.reset();
      applySectionEl.style.display = 'none';
      successMessageEl.style.display = 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      loadMeetings();
    }

    async function submitApplication(event) {
      event.preventDefault();
      if (!supabase || !selectedMeeting) {
        alert('먼저 모임을 선택해 주세요.');
        return;
      }

      const name = document.getElementById('userName').value.trim();
      const phone = normalizePhone(document.getElementById('userPhone').value);
      const account = document.getElementById('userAccount').value.trim();

      if (!name) {
        alert('이름을 입력해 주세요.');
        return;
      }
      if (phone.length < 10) {
        alert('전화번호를 올바르게 입력해 주세요.');
        return;
      }
      if (!account) {
        alert('계좌번호를 입력해 주세요.');
        return;
      }

      submitApplyBtn.disabled = true;
      submitApplyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 처리 중...';

      const { error } = await supabase.rpc('apply_to_meeting', {
        p_meeting_id: selectedMeeting.id,
        p_name: name,
        p_phone: phone,
        p_account: account
      });

      submitApplyBtn.disabled = false;
      submitApplyBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 신청하기';

      if (error) {
        alert(error.message || '신청 중 오류가 발생했습니다.');
        return;
      }

      successDetailEl.textContent = `${selectedMeeting.title} 모임에 ${name}님의 신청이 완료되었습니다.`;
      successMessageEl.style.display = 'flex';
    }

    document.getElementById('userPhone').addEventListener('input', (event) => {
      event.target.value = formatPhone(event.target.value);
    });

    document.getElementById('cancelApply').addEventListener('click', () => {
      selectedMeeting = null;
      applyFormEl.reset();
      applySectionEl.style.display = 'none';
    });

    document.getElementById('successResetBtn').addEventListener('click', resetForm);
    applyFormEl.addEventListener('submit', submitApplication);

    if (!isConfigured()) {
      showConfigAlert();
      meetingListEl.innerHTML = `
        <div class="error-state">
          <i class="fas fa-wrench"></i>
          <p>Supabase 연결 정보를 먼저 입력해 주세요.</p>
        </div>`;
    } else {
      supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      loadMeetings();
    }
  </script>
</body>
</html>
